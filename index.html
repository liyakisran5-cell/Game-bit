<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Games - Educational Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(90deg, #1e3a8a, #1e40af);
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .balance-box {
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 15px;
            padding: 20px;
            margin: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .balance-amount {
            font-size: 32px;
            font-weight: bold;
            color: #4ade80;
        }
        .game-card {
            background: #21262d;
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .bet-input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: none;
            text-align: center;
            font-size: 18px;
        }
        .btn-container {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 45%;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-green { background-color: #22c55e; color: white; }
        .btn-red { background-color: #ef4444; color: white; }
        .btn:active { transform: scale(0.95); }
        
        #result-display {
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }
        .history {
            margin-top: 20px;
            font-size: 12px;
            color: #8b949e;
        }
        .badge {
            background: #facc15;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PAK GAMES</h1>
        <div class="badge">DEMO MODE (No Real Money)</div>
    </div>

    <div class="balance-box">
        <div>Virtual Wallet Balance</div>
        <div class="balance-amount" id="balance">PKR 5,000</div>
    </div>

    <div class="game-card">
        <h3>Wingo Color Prediction</h3>
        <p>Choose Red or Green</p>
        
        <input type="number" id="betAmount" class="bet-input" value="100" min="10">
        
        <div class="btn-container">
            <button class="btn btn-green" onclick="playGame('Green')">GREEN</button>
            <button class="btn btn-red" onclick="playGame('Red')">RED</button>
        </div>

        <div id="result-display">Ready to Play?</div>
        
        <div class="history" id="history">History: --</div>
    </div>

    <script>
        let balance = 5000;
        let history = [];

        function playGame(choice) {
            const betInput = document.getElementById('betAmount');
            const bet = parseInt(betInput.value);
            const resultDisplay = document.getElementById('result-display');

            if (isNaN(bet) || bet <= 0) {
                alert("Please enter a valid amount!");
                return;
            }

            if (bet > balance) {
                alert("Insufficient Demo Balance!");
                return;
            }

            // Game Logic
            const colors = ["Red", "Green"];
            const winningColor = colors[Math.floor(Math.random() * colors.length)];
            
            balance -= bet;

            if (choice === winningColor) {
                const winAmount = bet * 2;
                balance += winAmount;
                resultDisplay.innerText = "WIN! Result was " + winningColor + ". You got " + winAmount;
                resultDisplay.style.color = "#22c55e";
            } else {
                resultDisplay.innerText = "LOST! Result was " + winningColor;
                resultDisplay.style.color = "#ef4444";
            }

            // Update UI
            document.getElementById('balance').innerText = "PKR " + balance.toLocaleString();
            updateHistory(winningColor);
        }

        function updateHistory(res) {
            history.unshift(res);
            if(history.length > 5) history.pop();
            document.getElementById('history').innerText = "History: " + history.join(" | ");
        }
    </script>
</body>
</html>
