<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Games - Educational Login</title>
    <style>
        :root { --primary-red: #ff4d4d; --bg-dark: #f8f9fa; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-dark); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login/Register Styling */
        .auth-container { width: 90%; max-width: 400px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: block; }
        .auth-header { background: linear-gradient(to bottom, #ff7e7e, #ff4d4d); padding: 40px 20px; text-align: center; color: white; }
        .auth-form { padding: 20px; }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; color: #666; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fdfdfd; }
        .btn-register { width: 100%; padding: 15px; background: linear-gradient(to right, #ff7e7e, #ff4d4d); border: none; border-radius: 25px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        
        /* Game Screen Styling */
        #game-screen { display: none; width: 100%; max-width: 400px; text-align: center; background: #0d1117; color: white; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .balance-card { background: #161b22; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #30363d; }
        .btn-game { padding: 15px; width: 45%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .green { background: #22c55e; } .red { background: #ef4444; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-header">
            <h2>PAK Games</h2>
            <p>Register by phone number</p>
        </div>
        <div class="auth-form">
            <div class="input-group">
                <label>Phone number</label>
                <input type="text" id="regPhone" placeholder="Please enter the phone number">
            </div>
            <div class="input-group">
                <label>Set password</label>
                <input type="password" id="regPass" placeholder="Set password">
            </div>
            <div class="input-group">
                <label>Confirm password</label>
                <input type="password" id="confirmPass" placeholder="Confirm password">
            </div>
            <div class="input-group">
                <label>Invite code</label>
                <input type="text" value="84128120386" readonly style="background: #eee;">
            </div>
            <button class="btn-register" onclick="handleRegister()">Register</button>
        </div>
    </div>

    <div id="game-screen">
        <h2>PAK GAMES</h2>
        <div class="balance-card">
            <p>Welcome, <span id="userDisplay"></span></p>
            <h3>Demo Balance: <span id="balance">PKR 5,000</span></h3>
        </div>
        <div style="background: #21262d; padding: 20px; border-radius: 15px;">
            <p>Wingo Color Prediction</p>
            <input type="number" id="betAmount" value="100" style="width: 80%; padding: 10px; margin-bottom: 10px;">
            <div style="display: flex; justify-content: space-around;">
                <button class="btn-game green" onclick="play('Green')">Green</button>
                <button class="btn-game red" onclick="play('Red')">Red</button>
            </div>
            <p id="resultText" style="margin-top: 20px;"></p>
        </div>
        <button onclick="logout()" style="margin-top: 20px; background: none; color: gray; border: none; cursor: pointer;">Logout</button>
    </div>

    <script>
        let currentBalance = 5000;

        // Register Function
        function handleRegister() {
            const phone = document.getElementById('regPhone').value;
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if(!phone || !pass) { alert("Please fill all fields"); return; }
            if(pass !== confirm) { alert("Passwords do not match!"); return; }

            // Storing in Browser Memory
            localStorage.setItem('user_phone', phone);
            localStorage.setItem('user_pass', pass);
            
            alert("Registration Successful!");
            showGame(phone);
        }

        function showGame(phone) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('userDisplay').innerText = phone;
        }

        function play(choice) {
            const bet = parseInt(document.getElementById('betAmount').value);
            if(bet > currentBalance) { alert("Not enough balance!"); return; }

            const winColor = Math.random() > 0.5 ? 'Green' : 'Red';
            currentBalance -= bet;

            if(choice === winColor) {
                currentBalance += (bet * 2);
                document.getElementById('resultText').innerText = "WIN! Result: " + winColor;
                document.getElementById('resultText').style.color = "#22c55e";
            } else {
                document.getElementById('resultText').innerText = "LOSE! Result: " + winColor;
                document.getElementById('resultText').style.color = "#ef4444";
            }
            document.getElementById('balance').innerText = "PKR " + currentBalance;
        }

        function logout() {
            location.reload(); // Refresh to go back to login
        }

        // Check if already logged in on load
        window.onload = () => {
            const savedUser = localStorage.getItem('user_phone');
            if(savedUser) {
                // Agar aap chahte hain ke page load hote hi login ho jaye to isay uncomment karen
                // showGame(savedUser); 
            }
        }
    </script>
</body>
</html>
