<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Games - Register</title>
    <style>
        :root { --main-red: #ff4d4d; --bg-gray: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 450px; background: white; min-height: 100vh; position: relative; }
        
        /* Header Style from Image */
        .auth-header { 
            background: linear-gradient(180deg, #ff7e7e 0%, #ff4d4d 100%); 
            padding: 50px 20px; text-align: center; color: white;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .logo { font-size: 32px; font-weight: bold; font-style: italic; letter-spacing: 2px; }
        
        .form-section { padding: 30px 25px; margin-top: -30px; }
        .register-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        h3 { color: #333; margin-bottom: 5px; font-size: 18px; }
        p.sub { color: #888; font-size: 13px; margin-bottom: 25px; }

        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 500; }
        
        /* Phone Input with +92 */
        .phone-wrapper { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; overflow: hidden; }
        .country-code { padding: 12px; background: #f0f0f0; border-right: 1px solid #ddd; font-weight: bold; color: #333; }
        .phone-wrapper input { border: none; outline: none; padding: 12px; width: 100%; background: transparent; font-size: 15px; }

        .standard-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; box-sizing: border-box; outline: none; }

        .btn-register { 
            width: 100%; padding: 14px; background: linear-gradient(to right, #ff7b7b, #ff4d4d); 
            border: none; border-radius: 30px; color: white; font-weight: bold; font-size: 17px; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3);
        }

        /* Game Screen Hidden by Default */
        #game-screen { display: none; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="auth-screen">
        <div class="auth-header">
            <div class="logo">PAK GAMES</div>
        </div>

        <div class="form-section">
            <div class="register-card">
                <h3>Register</h3>
                <p class="sub">Please register by phone number</p>

                <div class="input-box">
                    <label>Phone number</label>
                    <div class="phone-wrapper">
                        <span class="country-code">+92</span>
                        <input type="number" id="phone" placeholder="Enter phone number">
                    </div>
                </div>

                <div class="input-box">
                    <label>Set password</label>
                    <input type="password" id="pass" class="standard-input" placeholder="Set password">
                </div>

                <div class="input-box">
                    <label>Confirm password</label>
                    <input type="password" id="cpass" class="standard-input" placeholder="Confirm password">
                </div>

                <div class="input-box">
                    <label>Invite code</label>
                    <input type="text" value="84128120386" class="standard-input" readonly style="color:#999;">
                </div>

                <button class="btn-register" onclick="validateRegistration()">Register</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <h2 style="color: var(--main-red);">Welcome to Game</h2>
        <p>Your Phone: <span id="userPh"></span></p>
        <div style="background: #eee; padding: 40px; border-radius: 20px;">
            <h3>Balance: PKR 5,000</h3>
            <p>(Game Logic Loaded Successfully)</p>
        </div>
        <button onclick="location.reload()" style="margin-top: 20px;">Logout</button>
    </div>
</div>

<script>
    function validateRegistration() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        const cpass = document.getElementById('cpass').value;

        // Basic Pakistan Number Check (e.g. 3001234567 - 10 digits)
        if(phone.length < 10) {
            alert("Please enter a valid 10-digit phone number.");
            return;
        }

        if(pass === "" || cpass === "") {
            alert("Please set your password.");
            return;
        }

        if(pass !== cpass) {
            alert("Passwords do not match!");
            return;
        }

        // Save data locally
        localStorage.setItem('pak_user', phone);
        
        // Show Success and Switch Screen
        alert("Registration Successful!");
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('userPh').innerText = "+92 " + phone;
    }
</script>

</body>
</html>
