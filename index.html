<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Games Home - Demo</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fb; margin: 0; padding: 0; }
        .app-container { max-width: 450px; margin: auto; background: white; min-height: 100vh; position: relative; padding-bottom: 70px; }
        
        /* Top Navigation */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; }
        .logo { width: 100px; }
        
        /* Banner Area */
        .banner { width: 92%; margin: 10px auto; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .banner img { width: 100%; display: block; }

        /* Announcement Bar */
        .announcement { background: white; padding: 10px 15px; font-size: 12px; color: #666; display: flex; align-items: center; border-bottom: 1px solid #eee; }
        
        /* Game Grid */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .game-item { background: #fff; border-radius: 12px; padding: 15px 5px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0f0f0; transition: 0.2s; }
        .game-item:active { transform: scale(0.95); }
        .game-item img { width: 50px; margin-bottom: 8px; }
        .game-item p { margin: 0; font-size: 13px; font-weight: bold; color: #333; }

        /* Banner Colors (As per your image) */
        .popular { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .lottery { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        .slots { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }

        /* Large Categories */
        .big-row { display: flex; gap: 10px; padding: 0 15px; margin-bottom: 10px; }
        .big-item { flex: 1; padding: 20px; border-radius: 15px; color: white; font-weight: bold; position: relative; overflow: hidden; text-align: left; }
        .sports { background: #ff9a9e; }
        .casino { background: #fad0c4; }
        .fishing { background: #a18cd1; }

        /* Footer Menu */
        .footer-menu { position: fixed; bottom: 0; max-width: 450px; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .menu-btn { text-align: center; font-size: 11px; color: #888; text-decoration: none; }
        .menu-btn.active { color: #ff4d4d; }

        /* Hidden Sections */
        #auth-screen, #home-screen { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="auth-screen" style="display: block; padding: 20px; text-align: center;">
        <h2 style="color: #ff4d4d;">PAK GAMES</h2>
        <input type="number" id="phone" placeholder="Phone Number" style="width: 80%; padding: 12px; margin: 10px; border-radius: 10px; border: 1px solid #ddd;">
        <input type="password" id="pass" placeholder="Password" style="width: 80%; padding: 12px; margin: 10px; border-radius: 10px; border: 1px solid #ddd;">
        <button onclick="login()" style="width: 85%; padding: 15px; background: #ff4d4d; color: white; border: none; border-radius: 25px; font-weight: bold;">Register / Login Now</button>
    </div>

    <div id="home-screen">
        <div class="top-nav">
            <span style="font-weight: bold; color: #ff4d4d; font-size: 20px;">PAK GAMES</span>
            <span style="font-size: 20px;">📧 📥</span>
        </div>

        <div class="banner">
            <div style="background: #cc0000; height: 180px; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; text-align: center; padding: 20px;">
                OFFICIAL EVENT CHANNEL<br>Demo Version
            </div>
        </div>

        <div class="announcement">
            📢 All Recharge payment methods are active (Fake)
        </div>

        <div class="game-grid">
            <div class="game-item popular" onclick="alert('Popular Games Loading...')">
                <p>Popular</p>
            </div>
            <div class="game-item lottery" onclick="alert('Lottery Loading...')">
                <p>Lottery</p>
            </div>
            <div class="game-item slots" onclick="alert('Slots Loading...')">
                <p>Slots</p>
            </div>
        </div>

        <div class="big-row">
            <div class="big-item sports" onclick="alert('Sports Betting')">Sports</div>
            <div class="big-item casino" onclick="alert('Live Casino')">Casino</div>
        </div>

        <div class="big-row">
            <div class="big-item fishing" onclick="alert('Fishing Game')">Fishing</div>
            <div style="flex: 1; background: #fbc2eb; border-radius: 15px; padding: 20px;">Rummy</div>
        </div>

        <div class="footer-menu">
            <div class="menu-btn active">🏠<br>Home</div>
            <div class="menu-btn">📊<br>Activity</div>
            <div class="menu-btn">💰<br>Promotion</div>
            <div class="menu-btn">👤<br>Account</div>
        </div>
    </div>
</div>

<script>
    function login() {
        const ph = document.getElementById('phone').value;
        if(ph.length < 10) { alert("Invalid Phone!"); return; }
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }
</script>

</body>
</html>
